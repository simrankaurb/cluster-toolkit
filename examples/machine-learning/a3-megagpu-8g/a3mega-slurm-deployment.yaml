---
terraform_backend_defaults:
  type: gcs
  configuration:
    bucket: simranka

vars:
  deployment_name: deletion-test
  project_id: hpc-toolkit-dev
  region: europe-west1
  zone: europe-west1-c
  network_name_system: deletion-test-sys-net
  subnetwork_name_system: deletion-test-sys-subnet
  enable_ops_agent: true
  enable_nvidia_dcgm: true
  enable_nvidia_persistenced: true
  disk_size_gb: 200
  final_image_family: slurm-a3mega
  slurm_cluster_name: a3mega
  a3mega_cluster_size: 2 # supply cluster size
  a3mega_enable_spot_vm: true # To make use of Spot VMs, for more info visit: https://cloud.google.com/compute/docs/instances/spot
